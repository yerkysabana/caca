<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Untuk Kamu 💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Dancing+Script&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #ffd6e0, #ffeef3);
      overflow-x: hidden;
      text-align: center;
    }

    h1, h2 {
      font-family: 'Dancing Script', cursive;
    }

    .container {
      padding: 50px 20px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #ff6f91;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }

    button:hover {
      background: #ff3e6c;
    }

    .hidden {
      display: none;
    }

    .heart {
      position: fixed;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: floatUp 5s linear infinite;
    }

    .heart::before,
    .heart::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }

    .heart::before { top: -10px; }
    .heart::after { left: -10px; }

    @keyframes floatUp {
      0% { bottom: -10px; opacity: 1; }
      100% { bottom: 100%; opacity: 0; }
    }

    .slideshow img {
      width: 250px;
      max-width: 90%;
      border-radius: 20px;
      margin: 10px;
      animation: fade 3s infinite;
    }

    @keyframes fade {
      0% {opacity: 0.5;}
      50% {opacity: 1;}
      100% {opacity: 0.5;}
    }

    .typing {
      display: inline-block;
      max-width: 90%;
      white-space: normal;
      border-right: 3px solid;
      animation: blink 0.7s infinite;
      font-size: 18px;
      line-height: 1.6;
    }

    @keyframes blink {
      50% {border-color: transparent}
    }

    @media (max-width: 600px) {
      .typing {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<audio autoplay loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<!-- Landing -->
<div class="container" id="landing">
  <h1>💌 Aku punya sesuatu...</h1>
  <p>yang ingin aku sampaikan ke CACA Cewe aku yang paling cantik</p>
  <button onclick="nextPage()">Klik di sini</button>
</div>

<!-- Main -->
<div class="container hidden" id="main">
  <h2>Cewe Aku Paling Cantik 💖</h2>

  <div class="slideshow">
    <img src="1.jpeg">
    <img src="2.jpeg">
    <img src="3.jpeg">
  </div>

  <br><br>

  <h2 id="text" class="typing"></h2>

  <br><br>

  <button onclick="backToLanding()">⬅️ Kembali</button>
  <button onclick="lastPage()">Lanjut...</button>
</div>

<!-- Ending -->
<div class="container hidden" id="ending">
  <h1>Aku masih berharap kita bisa baik-baik lagi 💖</h1>

  <br>

  <button onclick="backToMain()">⬅️ Kembali</button>
  <br><br>

  <button onclick="alert('Makasih ya ❤️')">Iya, aku maafin ❤️</button>
  <br><br>
  <button onclick="alert('Aku bakal nunggu kamu 😢')">Aku masih butuh waktu 😢</button>
</div>

<script>
  const text = "Maaf ya Cewe aku yang paling cantik melintasi Cakrawala. aku sadar aku salah. Tadi bener bener ga masuk notifnya...";
  let i = 0;

  function typingEffect() {
    document.getElementById("text").innerHTML = "";
    i = 0;
    type();
  }

  function type() {
    if (i < text.length) {
      document.getElementById("text").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 50);
    }
  }

  function nextPage() {
    document.getElementById("landing").classList.add("hidden");
    document.getElementById("main").classList.remove("hidden");
    typingEffect();
  }

  function lastPage() {
    document.getElementById("main").classList.add("hidden");
    document.getElementById("ending").classList.remove("hidden");
  }

  function backToLanding() {
    document.getElementById("main").classList.add("hidden");
    document.getElementById("landing").classList.remove("hidden");
  }

  function backToMain() {
    document.getElementById("ending").classList.add("hidden");
    document.getElementById("main").classList.remove("hidden");
    typingEffect();
  }

  // hearts
  setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
</script>

</body>
</html>
